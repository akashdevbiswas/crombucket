<nav
  class="flex justify-between items-center font-bold p-4 margin_x bg-tertiary mt-[20px] rounded-2xl"
>
  <a
    routerLink="/"
    class="text-2xl md:text-3xl lg:text-4xl cursor-pointer text-white"
  >
    Crom Bucket
  </a>

  @if(user$ | async; as user) {
  <div class="flex items-center gap-3 relative overflow-visible">
    <div (mouseover)="onMouseOver()" (mouseleave)="onMouseOut()" class="w-[40px] h-[40px] bg-[#887AD3] rounded-full flex items-center justify-center cursor-pointer">
      <p class="text-lg cursor-pointer text-white">
        {{ user.firstName[0] + user.lastName[0] }}
      </p>
    </div>
    <p (mouseover)="onMouseOver()" (mouseleave)="onMouseOut()" class="text-lg md:text-xl lg:text-2xl cursor-pointer text-white">
      {{ user.username }}
    </p>
    @if(isHovered) {
      <div (mouseover)="onMouseOver()" (mouseleave)="onMouseOut()" class="w-fit absolute bg-white p-4 top-[20px] right-0 rounded-2xl">
        <button class="btn btn__primary" (click)="onSignOut()">Sign Out</button>
      </div>
    }
  </div>
  }@else { @if(url() === '/auth/sign-in'){
  <a class="btn text-base-white" routerLink="/auth/sign-up">Sign Up</a>
  }@else {
  <a class="btn text-base-white" routerLink="/auth/sign-in">Sign In</a>
  } }
</nav>
